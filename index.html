<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <title>SOP AI Training System</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 70%;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .output {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      text-align: left;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="container">

<h2>SOP → AI Training System</h2>

<textarea id="sop" placeholder="Paste SOP here..."></textarea><br>

<input type="file" id="fileInput" accept=".txt"><br>

<button onclick="useText()">Generate from Text</button>
<button onclick="uploadFile()">Upload File</button>

<div class="output" id="result"></div>

</div>

<script>
function showLoading() {
  document.getElementById("result").innerHTML = "⏳ Processing...";
}

function useText() {
  const sop = document.getElementById("sop").value;

  if (!sop) {
    alert("Enter SOP text");
    return;
  }

  showLoading();

  google.script.run
    .withSuccessHandler(showResult)
    .processSOP(sop);
}

function uploadFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("Upload a file");
    return;
  }

  showLoading();

  const reader = new FileReader();
  reader.onload = function(e) {
    google.script.run
      .withSuccessHandler(showResult)
      .processSOP(e.target.result);
  };

  reader.readAsText(file);
}

function showResult(data) {
  document.getElementById("result").innerText = data;
}
</script>

</body>
</html>
